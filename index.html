<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゴリラ回避ゲーム HARD</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#gorilla{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:52px;
}

/* 障害物 */

.obstacle{
position:absolute;
font-size:38px;
}

/* バナナ */

.banana{
position:absolute;
font-size:34px;
}

/* UI */

#score{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:28px;
font-weight:bold;
}

#high{
position:absolute;
top:60px;
left:20px;
color:white;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
font-size:40px;
}

button{
font-size:22px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="gorilla">🦍</div>

<div id="score">0</div>
<div id="high"></div>

<div id="message">
GORILLA DODGE<br><br>
<button onclick="startGame()">START</button>
</div>

</div>

<script>

const gorilla=document.getElementById("gorilla")
const game=document.getElementById("game")
const scoreText=document.getElementById("score")
const highText=document.getElementById("high")
const message=document.getElementById("message")

let x=window.innerWidth/2
let velocity=0
let accel=0.8
let friction=0.9
let maxSpeed=12

let moveLeft=false
let moveRight=false

let obstacles=[]
let bananas=[]

let score=0
let playing=false

let speed=4

let high=localStorage.getItem("gorillaHard") || 0
highText.textContent="HI "+high

/* 障害物 */

function createObstacle(){

let count=Math.floor(Math.random()*3)+2

for(let i=0;i<count;i++){

let o=document.createElement("div")
o.className="obstacle"
o.innerHTML="🧱"

let ox=Math.random()*(window.innerWidth-40)

o.style.left=ox+"px"
o.style.top="-40px"

game.appendChild(o)

obstacles.push({o,x:ox,y:-40})

}

if(Math.random()<0.5){
createBanana()
}

}

/* バナナ */

function createBanana(){

let b=document.createElement("div")
b.className="banana"
b.innerHTML="🍌"

let bx=Math.random()*(window.innerWidth-40)

b.style.left=bx+"px"
b.style.top="-40px"

game.appendChild(b)

bananas.push({b,x:bx,y:-40})

}

/* 衝突 */

function collide(a,b){

return !(
a.right<b.left ||
a.left>b.right ||
a.bottom<b.top ||
a.top>b.bottom
)

}

/* スタート */

function startGame(){

document.querySelectorAll(".obstacle,.banana").forEach(e=>e.remove())

obstacles=[]
bananas=[]

score=0
speed=4

scoreText.textContent=0

message.style.display="none"

playing=true

}

/* ゲームオーバー */

function gameOver(){

playing=false

if(score>high){

high=score
localStorage.setItem("gorillaHard",high)

}

highText.textContent="HI "+high

message.innerHTML="GAME OVER<br>Score "+score+"<br><br><button onclick='startGame()'>RETRY</button>"
message.style.display="block"

}

/* ループ */

function loop(){

/* スムーズ移動 */

if(moveLeft){
velocity-=accel
}

if(moveRight){
velocity+=accel
}

velocity*=friction

if(velocity>maxSpeed) velocity=maxSpeed
if(velocity<-maxSpeed) velocity=-maxSpeed

x+=velocity

if(x<0) x=0
if(x>window.innerWidth-40) x=window.innerWidth-40

gorilla.style.left=x+"px"

let gRect=gorilla.getBoundingClientRect()

/* 障害物 */

obstacles.forEach(o=>{

if(!playing) return

o.y+=speed

o.o.style.top=o.y+"px"

let rect=o.o.getBoundingClientRect()

if(collide(gRect,rect)){
gameOver()
}

if(o.y>window.innerHeight){

score++
scoreText.textContent=score

o.o.remove()

}

})

obstacles=obstacles.filter(o=>o.y<window.innerHeight)

/* バナナ */

bananas.forEach((b,i)=>{

if(!playing)return

b.y+=speed
b.b.style.top=b.y+"px"

let rect=b.b.getBoundingClientRect()

if(collide(gRect,rect)){

score+=5
scoreText.textContent=score

b.b.remove()
bananas.splice(i,1)

}

})

bananas=bananas.filter(b=>b.y<window.innerHeight)

/* 難易度上昇 */

if(playing){
speed+=0.0005
}

requestAnimationFrame(loop)

}

/* 障害物発生 */

setInterval(()=>{

if(playing)createObstacle()

},700)

/* 操作 */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") moveLeft=true
if(e.key==="ArrowRight") moveRight=true

})

document.addEventListener("keyup",e=>{

if(e.key==="ArrowLeft") moveLeft=false
if(e.key==="ArrowRight") moveRight=false

})

document.addEventListener("click",e=>{

if(e.clientX < window.innerWidth/2){
moveLeft=true
setTimeout(()=>moveLeft=false,100)
}else{
moveRight=true
setTimeout(()=>moveRight=false,100)
}

})

loop()

</script>

</body>
</html>
