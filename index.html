<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゴリラ回避ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#87ceeb;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* ゴリラ */

#gorilla{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:50px;
}

/* 障害物 */

.obstacle{
position:absolute;
font-size:40px;
}

/* バナナ */

.banana{
position:absolute;
font-size:35px;
}

/* 雲 */

.cloud{
position:absolute;
font-size:40px;
opacity:0.7;
}

/* スコア */

#score{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:28px;
}

#high{
position:absolute;
top:60px;
left:20px;
color:white;
}

/* メッセージ */

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
font-size:40px;
}

button{
font-size:22px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="gorilla">🦍</div>

<div id="score">0</div>
<div id="high"></div>

<div id="message">
ゴリラ回避ゲーム<br><br>
<button onclick="startGame()">START</button>
</div>

</div>

<script>

const game=document.getElementById("game")
const gorilla=document.getElementById("gorilla")
const scoreText=document.getElementById("score")
const highText=document.getElementById("high")
const message=document.getElementById("message")

let gorillaX=window.innerWidth/2
let speed=8

let obstacles=[]
let bananas=[]
let clouds=[]

let score=0
let playing=false

let high=localStorage.getItem("gorillaDodge") || 0
highText.textContent="HI "+high

/* 雲 */

function createCloud(){

let c=document.createElement("div")
c.className="cloud"
c.innerHTML="☁"

let x=Math.random()*window.innerWidth

c.style.left=x+"px"
c.style.top="-50px"

game.appendChild(c)

clouds.push({c,y:-50})

}

setInterval(createCloud,2000)

/* 障害物 */

function createObstacle(){

let o=document.createElement("div")
o.className="obstacle"
o.innerHTML="🧱"

let x=Math.random()*(window.innerWidth-40)

o.style.left=x+"px"
o.style.top="-40px"

game.appendChild(o)

obstacles.push({o,x,y:-40})

if(Math.random()<0.6){
createBanana()
}

}

/* バナナ */

function createBanana(){

let b=document.createElement("div")
b.className="banana"
b.innerHTML="🍌"

let x=Math.random()*(window.innerWidth-40)

b.style.left=x+"px"
b.style.top="-40px"

game.appendChild(b)

bananas.push({b,x,y:-40})

}

/* 衝突 */

function collide(a,b){

return !(
a.right<b.left ||
a.left>b.right ||
a.bottom<b.top ||
a.top>b.bottom
)

}

/* ゲーム開始 */

function startGame(){

message.style.display="none"

document.querySelectorAll(".obstacle,.banana").forEach(e=>e.remove())

obstacles=[]
bananas=[]

score=0
scoreText.textContent=0

playing=true

}

/* ゲームオーバー */

function gameOver(){

playing=false

if(score>high){

high=score
localStorage.setItem("gorillaDodge",high)

}

highText.textContent="HI "+high

message.innerHTML="GAME OVER<br>Score "+score+"<br><br><button onclick='startGame()'>RETRY</button>"
message.style.display="block"

}

/* ループ */

function loop(){

/* ゴリラ位置 */

gorilla.style.left=gorillaX+"px"

let gRect=gorilla.getBoundingClientRect()

/* 雲 */

clouds.forEach(c=>{

c.y+=1
c.c.style.top=c.y+"px"

})

clouds=clouds.filter(c=>c.y<window.innerHeight)

/* 障害物 */

obstacles.forEach(o=>{

if(!playing)return

o.y+=5

o.o.style.top=o.y+"px"

let rect=o.o.getBoundingClientRect()

if(collide(gRect,rect)){
gameOver()
}

if(o.y>window.innerHeight){

score++
scoreText.textContent=score

o.o.remove()

}

})

obstacles=obstacles.filter(o=>o.y<window.innerHeight)

/* バナナ */

bananas.forEach((b,i)=>{

if(!playing)return

b.y+=5
b.b.style.top=b.y+"px"

let rect=b.b.getBoundingClientRect()

if(collide(gRect,rect)){

score+=5
scoreText.textContent=score

b.b.remove()
bananas.splice(i,1)

}

})

bananas=bananas.filter(b=>b.y<window.innerHeight)

requestAnimationFrame(loop)

}

setInterval(()=>{

if(playing)createObstacle()

},1200)

/* 操作 */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){
gorillaX-=speed
}

if(e.key==="ArrowRight"){
gorillaX+=speed
}

})

document.addEventListener("click",e=>{

let x=e.clientX

if(x<window.innerWidth/2){
gorillaX-=speed*2
}else{
gorillaX+=speed*2
}

})

loop()

</script>

</body>
</html>
