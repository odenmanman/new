<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>飛べゴリラ風ゲーム</title>

<style>

body{
    text-align:center;
    background:#87ceeb;
    font-family:sans-serif;
}

canvas{
    background:white;
    border:3px solid black;
}

</style>
</head>

<body>

<h2>飛べゴリラ風ゲーム</h2>
<p>← → で左右に移動</p>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;

let gorilla = {
    x:200,
    y:520,
    size:40,
    targetX:200
};

let obstacles = [];
let bananas = [];

let speed = 2;

function createObstacle(){

    if(obstacles.length >= 4) return;

    obstacles.push({
        x:Math.random()*(canvas.width-40),
        y:-40,
        size:40
    });
}

function createBanana(){

    bananas.push({
        x:Math.random()*(canvas.width-30),
        y:-30,
        size:30
    });
}

setInterval(createObstacle,1200);
setInterval(createBanana,3000);

document.addEventListener("keydown",e=>{

    if(e.key==="ArrowLeft"){
        gorilla.targetX -=60;
    }

    if(e.key==="ArrowRight"){
        gorilla.targetX +=60;
    }

    if(gorilla.targetX<0) gorilla.targetX=0;

    if(gorilla.targetX>canvas.width-gorilla.size)
        gorilla.targetX=canvas.width-gorilla.size;

});

function update(){

    score++;

    // スムーズ移動
    gorilla.x += (gorilla.targetX - gorilla.x) * 0.15;

    // ★ゆるやかなスピード上昇
    speed = 2 + score / 5000;

    obstacles.forEach(o=>{

        o.y += speed;

        if(
            o.x < gorilla.x + gorilla.size &&
            o.x + o.size > gorilla.x &&
            o.y < gorilla.y + gorilla.size &&
            o.y + o.size > gorilla.y
        ){
            gameOver();
        }
    });

    bananas.forEach((b,i)=>{

        b.y += speed;

        if(
            b.x < gorilla.x + gorilla.size &&
            b.x + b.size > gorilla.x &&
            b.y < gorilla.y + gorilla.size &&
            b.y + b.size > gorilla.y
        ){
            score += 100;
            bananas.splice(i,1);
        }
    });

    obstacles = obstacles.filter(o=>o.y < canvas.height);
    bananas = bananas.filter(b=>b.y < canvas.height);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ゴリラ
    ctx.fillStyle="brown";
    ctx.fillRect(gorilla.x,gorilla.y,gorilla.size,gorilla.size);

    // 障害物
    ctx.fillStyle="black";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x,o.y,o.size,o.size);
    });

    // バナナ
    ctx.fillStyle="yellow";
    bananas.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x+15,b.y+15,15,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="black";
    ctx.font="20px sans-serif";
    ctx.fillText("Score: "+score,10,30);
}

function gameLoop(){

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

function gameOver(){

    alert("ゲームオーバー\nスコア："+score);
    location.reload();

}

gameLoop();

</script>

</body>
</html>
