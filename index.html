<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>とべゴリラ風ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#87ceeb;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* 雲 */
.cloud{
position:absolute;
font-size:40px;
opacity:0.8;
}

/* ゴリラ */
#gorilla{
position:absolute;
left:120px;
top:200px;
font-size:48px;
}

/* 障害物 */
.obstacle{
position:absolute;
width:60px;
background:#444;
}

/* バナナ */
.banana{
position:absolute;
font-size:30px;
}

/* スコア */
#score{
position:absolute;
top:20px;
left:20px;
font-size:28px;
color:white;
font-weight:bold;
}

#highscore{
position:absolute;
top:60px;
left:20px;
font-size:18px;
color:white;
}

/* メッセージ */
#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:40px;
color:white;
}

button{
font-size:22px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="gorilla">🦍</div>

<div id="score">0</div>
<div id="highscore"></div>

<div id="message">
<div id="title">とべゴリラ風ゲーム</div>
<br>
<button onclick="startGame()">START</button>
</div>

</div>

<script>

const gorilla=document.getElementById("gorilla")
const game=document.getElementById("game")
const scoreText=document.getElementById("score")
const highText=document.getElementById("highscore")
const message=document.getElementById("message")

let y=200
let velocity=0
let gravity=0.5
let jump=-9

let obstacles=[]
let bananas=[]
let clouds=[]

let score=0
let playing=false

let highscore=localStorage.getItem("gorillaHigh") || 0
highText.textContent="HI "+highscore

/* 雲 */

function createCloud(){

let c=document.createElement("div")
c.className="cloud"
c.innerHTML="☁"

let cy=Math.random()*300

c.style.top=cy+"px"
c.style.left=window.innerWidth+"px"

game.appendChild(c)

clouds.push({c,x:window.innerWidth})

}

setInterval(createCloud,3000)

/* 障害物 */

function createObstacle(){

let gap=200
let topHeight=Math.random()*300+50
let bottomHeight=window.innerHeight-topHeight-gap

let top=document.createElement("div")
top.className="obstacle"
top.style.height=topHeight+"px"
top.style.top="0"
top.style.left=window.innerWidth+"px"

let bottom=document.createElement("div")
bottom.className="obstacle"
bottom.style.height=bottomHeight+"px"
bottom.style.bottom="0"
bottom.style.left=window.innerWidth+"px"

game.appendChild(top)
game.appendChild(bottom)

obstacles.push({top,bottom,x:window.innerWidth})

if(Math.random()<0.8){
createBanana()
}

}

/* バナナ */

function createBanana(){

let b=document.createElement("div")
b.className="banana"
b.innerHTML="🍌"

let by=Math.random()*(window.innerHeight-200)+100

b.style.left=window.innerWidth+"px"
b.style.top=by+"px"

game.appendChild(b)

bananas.push({b,x:window.innerWidth})

}

/* 衝突 */

function collide(a,b){

return !(
a.right<b.left ||
a.left>b.right ||
a.bottom<b.top ||
a.top>b.bottom
)

}

/* ゲーム */

function startGame(){

message.style.display="none"

document.querySelectorAll(".obstacle,.banana").forEach(e=>e.remove())

obstacles=[]
bananas=[]

score=0
scoreText.textContent=0

y=200
velocity=0

playing=true

}

function gameOver(){

playing=false

if(score>highscore){

highscore=score
localStorage.setItem("gorillaHigh",highscore)

}

highText.textContent="HI "+highscore

message.innerHTML="GAME OVER<br>Score "+score+"<br><br><button onclick='startGame()'>RETRY</button>"
message.style.display="block"

}

/* ループ */

function loop(){

velocity+=gravity
y+=velocity

gorilla.style.top=y+"px"

let gRect=gorilla.getBoundingClientRect()

/* 雲 */

clouds.forEach(c=>{

c.x-=1
c.c.style.left=c.x+"px"

})

clouds=clouds.filter(c=>c.x>-50)

/* 障害物 */

obstacles.forEach(o=>{

if(!playing)return

o.x-=4

o.top.style.left=o.x+"px"
o.bottom.style.left=o.x+"px"

let tRect=o.top.getBoundingClientRect()
let bRect=o.bottom.getBoundingClientRect()

if(collide(gRect,tRect)||collide(gRect,bRect)){
gameOver()
}

if(o.x==120){

score++
scoreText.textContent=score

}

})

obstacles=obstacles.filter(o=>o.x>-80)

/* バナナ */

bananas.forEach((b,i)=>{

if(!playing)return

b.x-=4
b.b.style.left=b.x+"px"

let rect=b.b.getBoundingClientRect()

if(collide(gRect,rect)){

score+=5
scoreText.textContent=score

b.b.remove()
bananas.splice(i,1)

}

})

bananas=bananas.filter(b=>b.x>-60)

if(playing){

if(y>window.innerHeight || y<0){
gameOver()
}

}

requestAnimationFrame(loop)

}

setInterval(()=>{

if(playing)createObstacle()

},1800)

/* 操作 */

function jumpAction(){

if(!playing)return

velocity=jump

}

document.addEventListener("click",jumpAction)

document.addEventListener("keydown",e=>{
if(e.code==="Space")jumpAction()
})

loop()

</script>

</body>
</html>
