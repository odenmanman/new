<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>飛べゴリラ風ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#gorilla{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
font-size:50px;
}

.obstacle{
position:absolute;
font-size:40px;
}

.banana{
position:absolute;
font-size:35px;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:24px;
color:white;
text-shadow:2px 2px 3px black;
}

#gameover{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:40px;
color:white;
display:none;
text-shadow:2px 2px 5px black;
}

#buttons{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
}

button{
font-size:30px;
padding:20px;
opacity:0.7;
}

</style>
</head>

<body>

<div id="game">

<div id="gorilla">🦍</div>

<div id="score">Score:0</div>

<div id="gameover">
GAME OVER<br>
タップでリスタート
</div>

<div id="buttons">
<button id="left">◀</button>
<button id="right">▶</button>
</div>

</div>

<script>

const gorilla=document.getElementById("gorilla")
const game=document.getElementById("game")
const scoreText=document.getElementById("score")
const gameoverText=document.getElementById("gameover")

let gX=window.innerWidth/2
let obstacles=[]
let bananas=[]

let score=0
let speed=3
let frame=0
let running=true

function spawnObstacle(){

let count=3

for(let i=0;i<count;i++){

let o=document.createElement("div")
o.className="obstacle"
o.innerHTML="🧱"

let x=Math.random()*(window.innerWidth-40)

o.style.left=x+"px"
o.style.top="-40px"

game.appendChild(o)

obstacles.push({el:o,x:x,y:-40})

}

if(Math.random()<0.5){
spawnBanana()
}

}

function spawnBanana(){

let b=document.createElement("div")
b.className="banana"
b.innerHTML="🍌"

let x=Math.random()*(window.innerWidth-40)

b.style.left=x+"px"
b.style.top="-40px"

game.appendChild(b)

bananas.push({el:b,x:x,y:-40})

}

function update(){

if(!running)return

frame++

score+=0.1

scoreText.innerText="Score:"+Math.floor(score)

speed=3+score/200

if(frame%60==0){
spawnObstacle()
}

for(let i=obstacles.length-1;i>=0;i--){

let o=obstacles[i]

o.y+=speed

o.el.style.top=o.y+"px"

if(o.y>window.innerHeight){

o.el.remove()
obstacles.splice(i,1)

}

if(
Math.abs(o.x-gX)<40 &&
o.y>window.innerHeight-140 &&
o.y<window.innerHeight-80
){
gameOver()
}

}

for(let i=bananas.length-1;i>=0;i--){

let b=bananas[i]

b.y+=speed

b.el.style.top=b.y+"px"

if(b.y>window.innerHeight){

b.el.remove()
bananas.splice(i,1)

}

if(
Math.abs(b.x-gX)<40 &&
b.y>window.innerHeight-140 &&
b.y<window.innerHeight-80
){

score+=50

b.el.remove()
bananas.splice(i,1)

}

}

gorilla.style.left=gX+"px"

requestAnimationFrame(update)

}

function moveLeft(){
gX-=20
if(gX<0)gX=0
}

function moveRight(){
gX+=20
if(gX>window.innerWidth-40)gX=window.innerWidth-40
}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowLeft")moveLeft()
if(e.key=="ArrowRight")moveRight()

})

document.getElementById("left").ontouchstart=moveLeft
document.getElementById("right").ontouchstart=moveRight

function gameOver(){

running=false
gameoverText.style.display="block"

}

game.onclick=()=>{

if(!running){
location.reload()
}

}

update()

</script>

</body>
</html>
